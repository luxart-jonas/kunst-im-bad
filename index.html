<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Audio Test</title>
</head>
<body style="background:#111;color:#fff;font-family:-apple-system,sans-serif;display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;gap:32px;margin:0;">

<p style="font-size:18px;">Audio hochladen & abspielen</p>

<input type="file" id="picker" accept="*/*">

<p id="status" style="color:#888;font-size:14px;">Noch keine Datei</p>

<audio id="player" controls style="width:300px;display:none;"></audio>

<script>
document.getElementById('picker').addEventListener('change', function(e) {
  const file = e.target.files[0];
  if (!file) return;
  document.getElementById('status').textContent = 'Datei: ' + file.name + ' (' + file.type + ')';
  const url = URL.createObjectURL(file);
  const player = document.getElementById('player');
  player.src = url;
  player.style.display = 'block';
  player.play().catch(err => {
    document.getElementById('status').textContent += ' — Fehler: ' + err.message;
  });
});
</script>
</body>
</html>
